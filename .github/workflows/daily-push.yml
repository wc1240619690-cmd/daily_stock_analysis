# ============================================================
# opp-001 每日数据推送工作流
# ============================================================
# 交易日（周一至周五）北京时间 15:30（UTC 07:30）自动执行
# 拉取 A 股市场客观数据并推送到飞书群机器人
#
# 必要条件：
#   GitHub Secrets → FEISHU_WEBHOOK_URL
# ============================================================

name: Daily Stock Data Push

on:
  schedule:
    # 北京时间 15:30 = UTC 07:30（周一至周五）
    - cron: "30 7 * * 1-5"
  workflow_dispatch:
    # 手动触发，支持在 Actions 页面点击 Run workflow

jobs:
  push:
    name: Fetch & Push to Feishu
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install akshare pandas requests

      - name: Run opp-001 data push
        env:
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
        run: python opp-001-run.py
